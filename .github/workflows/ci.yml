name: CI — Analyze, Test & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation (Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "::error::No coverage file found. Tests may have failed."
            exit 1
          fi

          # Calculate line coverage percentage from lcov
          TOTAL_LINES=$(grep -c "^DA:" coverage/lcov.info || echo 0)
          HIT_LINES=$(grep "^DA:" coverage/lcov.info | grep -v ",0$" | wc -l || echo 0)

          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "::warning::No instrumented lines found in coverage report."
            exit 0
          fi

          COVERAGE=$(( HIT_LINES * 100 / TOTAL_LINES ))
          echo "Coverage: $COVERAGE% ($HIT_LINES / $TOTAL_LINES lines)"

          THRESHOLD=80
          if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
            echo "::warning::Coverage $COVERAGE% is below the $THRESHOLD% threshold."
            # Warn but don't fail for now — switch 'exit 0' to 'exit 1' to enforce
            exit 0
          else
            echo "Coverage $COVERAGE% meets the $THRESHOLD% threshold."
          fi
